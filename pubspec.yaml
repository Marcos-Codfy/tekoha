name: tekoha
description: Aplicativo educacional para ensino de línguas indígenas - Projeto Tekohá UniCatólica
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  http: ^1.1.0
  flutter_dotenv: ^5.1.0
  provider: ^6.1.1
  cupertino_icons: ^1.0.6
  audioplayers: ^6.6.0
  speech_to_text: ^7.4.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/fonts/